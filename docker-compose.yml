services:
  postgres:
    image: postgres:17-alpine
    container_name: medishop-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-medishop}
      POSTGRES_USER: ${POSTGRES_USER:-medishop}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-medishop_dev_password}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-medishop} -d ${POSTGRES_DB:-medishop}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: medishop-api
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env
    environment:
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT:-Development}
      ASPNETCORE_URLS: http://+:8080
    ports:
      - "${API_PORT:-5278}:8080"
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: medishop-frontend
    depends_on:
      - api
    ports:
      - "${FRONTEND_PORT:-4200}:80"
    restart: unless-stopped

volumes:
  postgres-data:
