<main class="account-page">
  <section class="account-hero">
    <div class="account-hero__content">
      <a routerLink="/catalogo" class="back-link">Voltar ao catalogo</a>
      <span class="section-label">Minha conta</span>
      <h1>Dados pessoais e endereco</h1>
      <p>Atualize suas informacoes para agilizar compras e entregas.</p>
    </div>
  </section>

  <section class="account-content">
    <form class="account-panel" [formGroup]="form" (ngSubmit)="save()">
      <div class="panel-header">
        <div>
          <span class="section-label">Perfil</span>
          <h2>Informacoes da conta</h2>
        </div>

        <button type="button" class="ghost-button" (click)="logout()">Sair da conta.</button>
      </div>

      <div class="form-grid">
        <label class="field">
          <span>Nome completo</span>
          <input type="text" formControlName="nome" />
        </label>

        <label class="field">
          <span>Email</span>
          <input type="email" formControlName="email" />
        </label>

        <label class="field">
          <span>CPF</span>
          <input type="text" formControlName="cpf" />
        </label>

        <label class="field">
          <span>Telefone</span>
          <input type="tel" formControlName="phone" />
        </label>
      </div>

      <div class="section-divider">
        <span class="section-label">Entrega</span>
        <h2>Endereco</h2>
      </div>

      <div class="form-grid">
        <label class="field">
          <span>CEP</span>
          <input type="text" formControlName="zipCode" />
        </label>

        <label class="field">
          <span>Estado</span>
          <input type="text" maxlength="2" formControlName="state" />
        </label>

        <label class="field field--wide">
          <span>Rua</span>
          <input type="text" formControlName="street" />
        </label>

        <label class="field">
          <span>Numero</span>
          <input type="text" formControlName="number" />
        </label>

        <label class="field">
          <span>Complemento</span>
          <input type="text" formControlName="complement" />
        </label>

        <label class="field">
          <span>Bairro</span>
          <input type="text" formControlName="neighborhood" />
        </label>

        <label class="field">
          <span>Cidade</span>
          <input type="text" formControlName="city" />
        </label>
      </div>

      @if (error()) {
        <div class="feedback feedback--error">{{ error() }}</div>
      }

      @if (success()) {
        <div class="feedback feedback--success">{{ success() }}</div>
      }

      <button type="submit" class="primary-button" [disabled]="saving()">
        {{ saving() ? 'Salvando...' : 'Salvar dados' }}
      </button>
    </form>
  </section>
</main>
