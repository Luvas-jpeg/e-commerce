<header class="app-header">
  <nav class="app-header__content" aria-label="Navegacao principal">
    <a routerLink="/" class="brand">MediShop</a>

    <div class="header-actions">
      <a routerLink="/catalogo" class="nav-link">Catalogo</a>

      @if (isAdmin()) {
        <a routerLink="/admin" class="header-link">Admin</a>
      }

      <a [routerLink]="user() ? '/conta' : '/login'" class="account-link" aria-label="Entrar ou acessar conta">
        <span class="account-icon" aria-hidden="true"></span>
        <span class="account-link__text">
          {{ user()?.nome || 'Entrar' }}
        </span>
      </a>

      <a routerLink="/carrinho" class="cart-link" aria-label="Abrir carrinho">
        <span class="cart-link__text">Carrinho</span>

        @if (cartCount() > 0) {
          <span class="cart-link__badge">{{ cartCount() }}</span>
        }
      </a>
    </div>
  </nav>
</header>

<router-outlet />

<footer class="app-footer">
  <div class="app-footer__content">
    <span>&copy; 2026 MediShop. Todos os direitos reservados.</span>
    <span>Equipamentos e cursos para profissionais da saude.</span>
  </div>
</footer>
